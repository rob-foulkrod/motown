site_name: Motown Git & GitHub Class
site_description: A class reference for Git commands and GitHub features.
site_url: https://rob-foulkrod.github.io/motown/
repo_url: https://github.com/rob-foulkrod/motown
repo_name: rob-foulkrod/motown
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Git Commands: git-commands.md
  - GitHub Features: github-features.md
  - Class Labs: labs.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
